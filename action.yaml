name: Fix newlines
description: Fix newlines
author: Shunsuke Suzuki

branding:
  icon: edit-3
  color: blue

inputs:
  github_token:
    description: |
      GitHub Access Token.
      contents:write - Push commits (required when fix=true)
    required: false
    default: ${{ github.token }}
  files:
    description: |
      Files to lint. Space- or newline-separated.
      If empty, `git ls-files` is used.
    required: false
  fix:
    description: If true, a fixed commit is pushed.
    required: false
    default: "false"
  trim_space:
    description: |
      If true, leading and trailing white spaces in files are disallowed.
    required: false
    default: "true"
  trim_trailing_space:
    description: |
      If true, trailing white spaces at the end of each line are disallowed.
    required: false
    default: "false"
  fail_on_push:
    description: |
      If true (default), the action fails after it pushes a commit,
      so the triggering workflow re-runs on the pushed commit.
    required: false
    default: "true"

runs:
  using: "node24"
  main: "dist/index.js"
