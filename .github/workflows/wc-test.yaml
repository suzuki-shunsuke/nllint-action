---
name: Test action
on:
  workflow_call:
    inputs:
      files:
        type: string
        description: "Fixed files"
        required: false
jobs:
  test-action:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions: {}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./
        with:
          fix: true
          github_token: ${{github.token}}
          files: ${{inputs.files}}
